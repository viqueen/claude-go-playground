version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: github.com/viqueen/claude-go-playground/grpc-backend/gen/sdk
plugins:
  - protoc_builtin: go
    out: gen/sdk
    opt: paths=source_relative
  - protoc_builtin: go-grpc
    out: gen/sdk
    opt: paths=source_relative
